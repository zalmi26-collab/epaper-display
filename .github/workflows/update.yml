name: Update display image

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour, UTC
  workflow_dispatch: {}     # manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: epaper-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r server/requirements.txt

      - name: Materialize service account JSON
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > secrets/service_account.json
          test -s secrets/service_account.json || (echo "Empty service account secret" && exit 1)

      - name: Render display image
        env:
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
        run: python server/main.py

      - name: Verify BMP exists
        run: |
          test -f output/display.bmp
          ls -la output/

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: false
          commit_message: "auto: refresh display.bmp"
